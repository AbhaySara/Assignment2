<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>Login</h1>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email Address" required>
        </div>

        <button type="submit" class="btn">LOGIN</button>
    </form>

    <div class="footer">
        Not a member? <a href="usingcss.html">Create Account</a>
    </div>
</div>

</body>
</html>
