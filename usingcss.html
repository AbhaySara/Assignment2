<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f3d7d7;
    }
    .container {
        width: 700px;
        margin: auto;
        background: #f3d7d7;
        padding: 20px;
    }
    h1 {
        text-align: center;
    }
    table {
        width: 100%;
    }
    td {
        padding: 8px;
        vertical-align: top;
    }
    input, select, textarea {
        width: 100%;
        padding: 6px;
    }
    .small-input {
        width: 30%;
        display: inline-block;
    }
    .gender, .dept {
        width: auto;
    }
    .btn {
        text-align: center;
    }
    button {
        padding: 8px 20px;
        font-size: 16px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Student Registration Form</h1>

    <form>
        <table>
            <tr>
                <td>Roll No:</td>
                <td><input type="text" required></td>
            </tr>

            <tr>
                <td>Student Name:</td>
                <td>
                    <input type="text" placeholder="First Name" class="small-input" required>
                    -
                    <input type="text" placeholder="Last Name" class="small-input" required>
                </td>
            </tr>

            <tr>
                <td>Father's Name:</td>
                <td><input type="text" required></td>
            </tr>

            <tr>
                <td>Date of Birth:</td>
                <td>
                    <input type="text" placeholder="Day" class="small-input" required> -
                    <input type="text" placeholder="Month" class="small-input" required> -
                    <input type="text" placeholder="Year" class="small-input" required> (DD-MM-YYYY)
                </td>
            </tr>

            <tr>
                <td>Mobile No:</td>
                <td>
                    <input type="text" value="+91" class="small-input" required> -
                    <input type="text" class="small-input" required>
                </td>
            </tr>

            <tr>
                <td>Email ID:</td>
                <td><input type="email" required></td>
            </tr>

            <tr>
                <td>Password:</td>
                <td><input type="password" required></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" class="gender" required> Male
                    <input type="radio" name="gender" class="gender" required> Female
                </td>
            </tr>

            <tr>
                <td>Department:</td>
                <td>
                    <input type="checkbox" class="dept" required> CSE
                    <input type="checkbox" class="dept" required> IT
                    <input type="checkbox" class="dept" required> ECE
                    <input type="checkbox" class="dept" required> Civil
                    <input type="checkbox" class="dept" required> Mech
                </td>
            </tr>

            <tr>
                <td>Course:</td>
                <td>
                    <select required>
                        <option>Select Current Course</option>
                        <option>B.Tech</option>
                        <option>B.Sc</option>
                        <option>BCA</option>
                        <option>M.Tech</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Student Photo:</td>
                <td><input type="file" required></td>
            </tr>

            <tr>
                <td>City:</td>
                <td><input type="text" required></td>
            </tr>

            <tr>
                <td>Address:</td>
                <td><textarea rows="4" required></textarea></td>
            </tr>

            <tr>
                <td colspan="2" class="btn">
                    <button type="submit">Register</button>
                </td>
            </tr>

        </table>
    </form>
</div>

</body>
</html>
